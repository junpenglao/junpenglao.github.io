<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" role="img"
     aria-label="A Claude Code permission prompt asking whether to allow a bash command."
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect width="640" height="340" fill="#FBF8F3"/>
  <rect x="24" y="24" width="592" height="292" rx="10" fill="#ffffff" stroke="#D9CFC0" stroke-width="1.5"/>
  <circle cx="48" cy="52" r="5" fill="#D9CFC0"/>
  <circle cx="66" cy="52" r="5" fill="#D9CFC0"/>
  <circle cx="84" cy="52" r="5" fill="#D9CFC0"/>
  <text x="116" y="57" fill="#6B6256" font-size="14">Claude Code — permission</text>
  <line x1="24" y1="74" x2="616" y2="74" stroke="#EDE6DA" stroke-width="1"/>
  <text x="48" y="112" fill="#2B2620" font-size="15">Bash command</text>
  <rect x="48" y="124" width="544" height="34" rx="6" fill="#F4EEE3"/>
  <text x="64" y="146" fill="#2B2620" font-size="15">rm -rf build/</text>
  <text x="48" y="198" fill="#2B2620" font-size="16">Do you want to proceed?</text>
  <path d="M48 218 l9 5.5 l-9 5.5 z" fill="#9B524C"/>
  <text x="66" y="228" fill="#9B524C" font-size="15" font-weight="700">1. Yes</text>
  <text x="66" y="256" fill="#6B6256" font-size="15">2. Yes, and don't ask again for rm commands</text>
  <text x="66" y="284" fill="#6B6256" font-size="15">3. No, and tell Claude what to do differently</text>
</svg>
